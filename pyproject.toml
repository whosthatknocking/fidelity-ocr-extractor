[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "fidelity-extractor"
version = "0.1.0"
description = "Extract Fidelity Trader+ monitoring screenshots into CSV files and browse them locally."
readme = "README.md"
requires-python = ">=3.9"
license = {file = "LICENSE"}
authors = [
    {name = "emt"},
]
dependencies = [
    "Pillow>=10.0.0",
    "tomli>=2.0; python_version < '3.11'",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[project.scripts]
fidelity-extractor = "main:main"
fidelity-extractor-viewer = "viewer:main"

[tool.setuptools]
py-modules = ["extract", "viewer", "main"]

[tool.setuptools.package-data]
"*" = ["viewer_static/*", "docs/*"]
