<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fidelity Extractor Viewer</title>
  <link rel="stylesheet" href="/styles.css?v=1">
</head>
<body>
  <div class="page-shell">
    <div class="workspace-shell">
      <header class="workspace-header">
        <div class="workspace-title">
          <p class="eyebrow">Fidelity Extractor</p>
          <h1>Positions Monitoring Viewer</h1>
        </div>
        <div class="workspace-controls">
          <label class="select-wrap header-select-wrap">
            <span>CSV File</span>
            <select id="fileSelect" aria-label="CSV File"></select>
          </label>
          <div class="header-tab-cluster">
            <nav class="tabs rail-tabs" aria-label="Primary">
              <button class="tab-button active" type="button" data-tab="table"><span class="tab-title">Dataset</span></button>
              <button class="tab-button" type="button" data-tab="overview"><span class="tab-title">Overview</span></button>
              <button class="tab-button" type="button" data-tab="reference"><span class="tab-title">Reference</span></button>
            </nav>
            <button id="themeToggle" class="theme-toggle" type="button">Dark</button>
          </div>
        </div>
      </header>

      <main class="workspace-main">
        <section id="tableTab" class="tab-panel active">
          <div class="toolbar">
            <div class="toolbar-stats">
              <div class="freshness-card stat-card">
                <span class="stat-label">Rows</span>
                <strong id="rowCount">0</strong>
              </div>
              <div id="freshnessSummary" class="freshness-summary"></div>
              <div id="datasetCards" class="freshness-summary"></div>
            </div>
            <label class="select-wrap compact-wrap">
              <span>Rows Per Page</span>
              <select id="pageSizeSelect">
                <option value="50">50</option>
                <option value="100" selected>100</option>
                <option value="250">250</option>
                <option value="all">All</option>
              </select>
            </label>
          </div>

          <div class="table-card">
            <div id="tableStatus" class="table-status">Loading data...</div>
            <div class="table-scroll">
              <table id="dataTable">
                <thead></thead>
                <tbody></tbody>
              </table>
            </div>
            <div class="pagination-bar">
              <button id="prevPageButton" class="pager-button" type="button">Previous</button>
              <span id="pageInfo" class="page-info">Page 1 of 1</span>
              <button id="nextPageButton" class="pager-button" type="button">Next</button>
            </div>
          </div>
        </section>

        <section id="overviewTab" class="tab-panel">
          <div class="summary-shell">
            <div id="overviewStatus" class="summary-status">Loading overview...</div>
            <div id="overviewGrid" class="summary-ticker-grid"></div>
          </div>
        </section>

        <section id="referenceTab" class="tab-panel">
          <article id="referenceContent" class="readme-card"></article>
        </section>
      </main>
    </div>
  </div>

  <div id="rowModal" class="row-modal" aria-hidden="true">
    <div class="row-modal-backdrop" data-close-modal="true"></div>
    <section class="row-modal-panel" role="dialog" aria-modal="true" aria-labelledby="rowModalTitle">
      <header class="row-modal-header">
        <div>
          <p class="row-modal-kicker">Row Details</p>
          <h2 id="rowModalTitle">Record</h2>
        </div>
        <button id="closeRowModalButton" class="row-modal-close" type="button">Close</button>
      </header>
      <div id="rowModalMeta" class="row-modal-meta"></div>
      <div id="rowDetailGrid" class="row-detail-grid"></div>
    </section>
  </div>

  <div id="filterPopover" class="filter-popover" aria-hidden="true">
    <div class="filter-popover-header">
      <strong id="filterPopoverTitle">Filter</strong>
      <button id="clearFilterButton" class="filter-clear-button" type="button">Clear</button>
    </div>
    <label id="filterSearchWrap" class="filter-search-wrap">
      <span>Search Values</span>
      <input id="filterValueSearch" type="search" placeholder="Filter values">
    </label>
    <div id="filterRangeWrap" class="filter-range-wrap" hidden>
      <label class="filter-range-field">
        <span>Min</span>
        <input id="filterMinValue" type="number" inputmode="decimal" placeholder="Min">
      </label>
      <label class="filter-range-field">
        <span>Max</span>
        <input id="filterMaxValue" type="number" inputmode="decimal" placeholder="Max">
      </label>
    </div>
    <div id="filterOptionList" class="filter-option-list"></div>
  </div>

  <script src="/app.js?v=1"></script>
</body>
</html>
